name: Android CI

on:
  push:
    branches:
      - main
      - master
      - mort_debug
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - mort_debug
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          sudo mkdir -p "$ANDROID_SDK_ROOT"
          sudo chown "$USER:$USER" "$ANDROID_SDK_ROOT"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Restore release keystore
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          echo "${SIGNING_KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          ls -l "$RUNNER_TEMP/release.keystore"
          echo "Alias: ${SIGNING_KEY_ALIAS}"
          echo "::add-mask::${SIGNING_KEY_PASSWORD}"
          echo "::add-mask::${SIGNING_STORE_PASSWORD}"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${SIGNING_KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "STORE_PASSWORD=${SIGNING_STORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${SIGNING_KEY_PASSWORD}" >> "$GITHUB_ENV"

      - name: Build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew clean assembleDebug --no-daemon -PbilitvBuildRoot="$GITHUB_WORKSPACE/build"

      - name: Build release APKs
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-apks"
          for abi in arm64-v8a armeabi-v7a; do
            ./gradlew clean assembleRelease --no-daemon \
              -PbilitvBuildRoot="$GITHUB_WORKSPACE/build" \
              -PbilitvVersionName="${{ github.ref_name }}" \
              -PtargetAbi="$abi" \
              -Pkey.store="$KEYSTORE_PATH" \
              -Pkey.alias="$KEY_ALIAS" \
              -Pkey.store.password="$STORE_PASSWORD" \
              -Pkey.key.password="$KEY_PASSWORD"
            SRC=$(find "$GITHUB_WORKSPACE/build" -name "*.apk" -type f | head -1)
            DST="$GITHUB_WORKSPACE/release-apks/BiliMT-${{ github.ref_name }}-$abi.apk"
            cp "$SRC" "$DST"
            echo "Built $DST from $SRC"
          done

      - name: Delete old prereleases
        if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, re, subprocess, sys

          def parse_version_code(tag):
              tag = tag.removeprefix('v').removeprefix('V')
              m = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)(?:-([a-zA-Z]+)\.(\d+))?', tag)
              if not m:
                  return None
              major, minor, patch, label, index = m.groups()
              label_order = {'alpha': 1, 'beta': 2, 'rc': 3}.get((label or '').lower(), 0)
              return int(major) * 1000000 + int(minor) * 10000 + int(patch) * 1000 + label_order * 100 + int(index or 0)

          current_tag = '${{ github.ref_name }}'
          current_vc = parse_version_code(current_tag)
          if current_vc is None:
              sys.exit(0)

          result = subprocess.run(
              ['gh', 'release', 'list', '--limit', '1000', '--json', 'tagName'],
              capture_output=True, text=True, check=True,
          )
          releases = json.loads(result.stdout)
          for r in releases:
              tag = r['tagName']
              if '-' not in tag:
                  continue
              vc = parse_version_code(tag)
              if vc is not None and vc < current_vc:
                  print(f'Deleting old prerelease {tag} (versionCode {vc})')
                  subprocess.run(['gh', 'release', 'delete', tag, '--yes'], check=False)
          PY

      - name: Create Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: release-apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only latest 10 workflow runs
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, subprocess

          result = subprocess.run(
              ['gh', 'run', 'list', '--limit', '1000', '--json', 'databaseId,createdAt'],
              capture_output=True, text=True, check=True,
          )
          runs = json.loads(result.stdout)
          runs.sort(key=lambda r: r['createdAt'], reverse=True)
          for run in runs[10:]:
              run_id = run['databaseId']
              print(f'Deleting workflow run {run_id}')
              subprocess.run(['gh', 'run', 'delete', str(run_id)], check=False)
          PY
